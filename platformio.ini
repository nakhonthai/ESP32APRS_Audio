; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
;default_envs = esp32c3-nodisp, esp32c3-sh1106, esp32c3-ssd1306, esp32-nodisp, esp32-sh1106, esp32-ssd1306, esp32s3-sh1106, esp32s3-N16R8, esp32s3-NOOTA, TTGO-TWR
;default_envs = esp32s3-sh1106, esp32s3-N16R8
;default_envs = esp32-NOOTA, esp32-nodisp, esp32-sh1106, esp32-ssd1306
;default_envs = esp32c3-NOOTA, esp32c3-nodisp, esp32c3-sh1106, esp32c3-ssd1306
;default_envs = esp32c3-nodisp
;default_envs = esp32c3-sh1106
;default_envs = esp32c6
;default_envs = esp32-sh1106
;default_envs = esp32-nodisp
;default_envs = esp32s3-sh1106
;default_envs = esp32s3-NOOTA
;default_envs = esp32-NOOTA
default_envs = TTGO-TWR, esp32s3-NOOTA

[env]
extra_scripts = post:copy_firmware.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.partitions = min_spiffs.csv
monitor_speed = 115200
upload_protocol = esptool
monitor_filters = esp32_exception_decoder
lib_deps =
	densaugeo/base64@^1.2.1
	mikalhart/TinyGPSPlus@^1.0.2
	adafruit/Adafruit NeoPixel@^1.11.0
	plerup/EspSoftwareSerial@^8.2.0
	4-20ma/ModbusMaster@^2.0.1
	adafruit/Adafruit BME280 Library@^2.2.4
	adafruit/Adafruit BMP280 Library@^2.6.8
	adafruit/Adafruit Si7021 Library@^1.5.3
	adafruit/Adafruit CCS811 Library@^1.1.3
	sensirion/arduino-sht@^1.2.5
	bblanchon/ArduinoJson@^7.3.0	

build_flags = 
	-L./lib
	-Wl,-Map,output.map
	-Os
    -ffunction-sections
    -fdata-sections    
    -DNDEBUG
	-DVERSION=\"1.8\"
	-DVERSION_BUILD=\"a\"
	;-DCONFIG_LWIP_TCPIP_CORE_LOCKING=1 
	-DCONFIG_ASYNC_TCP_STACK_SIZE=8192
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=16
	-DWEBSERVER_MAX_POST_ARGS=80
	-DCONFIG_I2C_ENABLE_DEBUG_LOG=0
	-DCORE_DEBUG_LEVEL=0
	-DLWIP_SNMP=0
    -DLWIP_STATS=0
	-DLWIP_HTTPD=0               ; ปิด HTTP server ของ LWIP ถ้าไม่ใช้
	-DENABLE_FX25
	-DRFMODULE
	-DCONFIG_MBEDTLS_SSL_SERVER=0        ; ปิด SSL server	
	; ปิด feature ที่ไม่ใช้ของ WiFi
    ;-DCONFIG_ESP_WIFI_ENABLE_WPA3_SAE=0
    ;-DCONFIG_ESP_WIFI_ENABLE_SAE_PK=0
    ;-DCONFIG_ESP_WIFI_ENTERPRISE_SUPPORT=0
    ;-DCONFIG_ESP_WIFI_WPS_SUPPORT=0
    ;-DCONFIG_ESP_WIFI_WAPI_PSK_SUPPORT=0
    ;-DCONFIG_ESP_WIFI_11AC_SUPPORT=0
	; ปิด debug
    -DCONFIG_LOG_DEFAULT_LEVEL=0
    -DCONFIG_LOG_MAXIMUM_LEVEL=0

build_flags_reduce = 
	-std=gnu++17
	-std=gnu++11
	-Wl,--gc-sections          ; เปิดใช้งาน gc-sections
    ;-Wl,--print-gc-sections    ; แสดงสิ่งที่ถูกตัดทิ้ง (เพื่อ debug)
	-fno-rtti
	-fno-threadsafe-statics      ; ปิด thread-safe statics
    -fno-exceptions            ; ปิด exception
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
	;-ffast-math                   ; ใช้ fast math (อาจลดความแม่นยำ)
    ;-fno-math-errno              ; ปิด errno สำหรับ math

[esp32dev_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board_build.mcu = esp32
build_flags = 
	${env.build_flags}
	${env.build_flags_reduce}

[esp32c3_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board_build.mcu = esp32c3
build_flags = 
	${env.build_flags}
	${env.build_flags_reduce}

[esp32c6_base]
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
build_flags = 
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

[esp32s3_base]
board_build.mcu = esp32s3
board = esp32-s3-devkitc-1
build_flags = 
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32s3-sh1106]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = dio_opi
lib_deps = ${env.lib_deps}
	h2zero/NimBLE-Arduino@^2.3.4
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
lib_extra_dirs =
	./lib_extra/NuS-NimBLE-Serial	
build_flags = ${esp32s3_base.build_flags}
	-DSTRIP_PIN=48
	-DOLED
	-DSH1106
	-DBLUETOOTH	
	-DPPPOS

[env:esp32s3-NOOTA]
board = lolin_s3_mini
board_build.mcu = esp32s3
board_build.partitions = flash_NOOTA.csv
lib_deps = ${env.lib_deps}
	h2zero/NimBLE-Arduino@^2.3.4
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
lib_extra_dirs =
	./lib_extra/NuS-NimBLE-Serial	
build_flags = ${esp32s3_base.build_flags}
	-DESP32S3_MINI
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DSTRIP_PIN=48
	-DOLED
	-DSH1106
	-DBLUETOOTH
	-DPPPOS
	-DNO_OTA
	-DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1

[env:esp32s3-N16R8]
board = esp32s3box
board_build.mcu = esp32s3
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
lib_deps = ${env.lib_deps}
	h2zero/NimBLE-Arduino@^2.3.4
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
lib_extra_dirs =
	./lib_extra/NuS-NimBLE-Serial	
build_flags = ${esp32s3_base.build_flags}
	-DESP32S3_N16R8
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DSTRIP_PIN=48
	-DOLED
	-DSH1106
	-DBLUETOOTH
	-DPPPOS
	-DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1

[env:TTGO-TWR]
board = esp32s3box
board_build.mcu = esp32s3
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
lib_deps = ${env.lib_deps}
	h2zero/NimBLE-Arduino@^2.3.4
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
	lewisxhe/XPowersLib@^0.1.7
	igorantolic/Ai Esp32 Rotary Encoder@^1.6
	ricmoo/QRCode@^0.0.1
lib_extra_dirs =
	./lib_extra/NuS-NimBLE-Serial
	./lib_extra/gui_lcd
build_flags = ${esp32s3_base.build_flags}
	-DTTGO_TWR
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DSTRIP_PIN=42
	-DGUI_LCD
	-DSH1106
	-DBLUETOOTH
	-DPPPOS
	-DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1	
	-DAXP21XX

[env:esp32-sh1106]
platform = ${esp32dev_base.platform}
board = esp32doit-devkit-v1
lib_deps = ${env.lib_deps}
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
build_flags = ${esp32dev_base.build_flags}
	-DOLED
	-DSH1106

[env:esp32-nodisp]
platform = ${esp32dev_base.platform}
board = esp32doit-devkit-v1
lib_deps = ${env.lib_deps}
build_flags = ${esp32dev_base.build_flags}
	-DPPPOS

[env:esp32-ssd1306]
platform = ${esp32dev_base.platform}
board = esp32doit-devkit-v1
lib_deps = ${env.lib_deps}
build_flags = ${esp32dev_base.build_flags}
	-DOLED

[env:esp32c3-NOOTA]
platform = ${esp32c3_base.platform}
board = esp32-c3-devkitm-1
board_build.partitions = flash_NOOTA.csv
lib_deps = ${env.lib_deps}
	h2zero/NimBLE-Arduino@^2.3.4
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
lib_extra_dirs =
	./lib_extra/NuS-NimBLE-Serial	
build_flags = ${esp32c3_base.build_flags}
	-DESP32C3_MINI
	-DSTRIP_PIN=2
	-DOLED
	-DSH1106
	-DBLUETOOTH
	-DPPPOS
	-DNO_OTA

[env:esp32-NOOTA]
platform = ${esp32dev_base.platform}
board = esp32doit-devkit-v1
board_build.partitions = flash_NOOTA.csv
lib_deps = ${env.lib_deps}
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2	
build_flags = ${esp32dev_base.build_flags}
	-DOLED
	-DSH1106
	-DBLUETOOTH
	-DPPPOS
	-DNO_OTA

[env:esp32c3-sh1106]
platform = ${esp32c3_base.platform}
board = esp32-c3-devkitm-1
lib_deps = ${env.lib_deps}
	aki237/Adafruit_ESP32_SH1106 @ ^1.0.2
build_flags = ${esp32c3_base.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT
	-DARDUINO_USB_MODE
	-DESP32C3_MINI
	-DSTRIP_PIN=2
	-DOLED
	-DSH1106
	;-DPPPOS
	;-DSSD1306_72x40

[env:esp32c3-ssd1306]
platform = ${esp32c3_base.platform}
board = esp32-c3-devkitm-1
lib_deps = ${env.lib_deps}
build_flags = ${esp32c3_base.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT
	-DARDUINO_USB_MODE
	-DESP32C3_MINI
	-DSTRIP_PIN=2
	-DOLED
	;-DPPPOS

[env:esp32c3-nodisp]
platform = ${esp32c3_base.platform}
board = esp32-c3-devkitm-1
lib_deps = ${env.lib_deps}
build_flags = ${esp32c3_base.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT
	-DARDUINO_USB_MODE
	-DESP32C3_MINI
	-DSTRIP_PIN=2
	-DPPPOS

[env:esp32c6]
board = esp32-c6-devkitm-1
lib_deps = ${env.lib_deps}
build_flags = ${esp32c6_base.build_flags}
	-DESP32C6
	;-DOLED
	;-DSSD1306_72x40
